# cspell:word sbpf
---
description: 'Install sbpf CLI'
inputs:
  sbpf-cli-revision:
    description: 'sbpf CLI rev (git commit hash, tag, or branch) to install'
    required: true
name: 'Install sbpf CLI'
runs:
  steps:
  - id: 'cache-sbpf'
    name: 'Restore sbpf CLI cache'
    uses: 'actions/cache/restore@v5'
    with:
      key: 'sbpf-cli-${{ inputs.sbpf-cli-revision }}-${{ runner.os }}-${{
            runner.arch }}'
      path: '~/.cargo/bin/sbpf'
  - if: 'steps.cache-sbpf.outputs.cache-hit != ''true'''
    name: 'Install sbpf CLI'
    # Clone, generate a lock file with blake3 <1.8.4 to avoid
    # digest 0.10/0.11 conflict, then install from the local path.
    run: |
      git clone https://github.com/blueshift-gg/sbpf.git /tmp/sbpf
      cd /tmp/sbpf
      git checkout ${{ inputs.sbpf-cli-revision }}
      cargo generate-lockfile
      cargo update blake3 --precise 1.8.3
      cargo install --path . --locked
      rm -rf /tmp/sbpf
    shell: 'sh'
  - if: 'steps.cache-sbpf.outputs.cache-hit != ''true'''
    name: 'Save sbpf CLI cache'
    uses: 'actions/cache/save@v5'
    with:
      key: 'sbpf-cli-${{ inputs.sbpf-cli-revision }}-${{ runner.os }}-${{
            runner.arch }}'
      path: '~/.cargo/bin/sbpf'
  - name: 'Verify sbpf CLI'
    run: 'sbpf --version'
    shell: 'sh'
  using: 'composite'
...
