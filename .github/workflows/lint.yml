# cspell:word chktex
---
env:
  NODE_VERSION: '25'
  PRE_COMMIT_VERSION: '4.5.1'
  PYTHON_VERSION: '3.14.3'
  RUST_VERSION: 'stable'
jobs:
  lint:
    env:
      CONFIG_PATH: 'cfg/pre-commit-lint.yml'
    name: 'Lint'
    runs-on: 'ubuntu-latest'
    steps:
    # Cache chktex binary to skip apt-get update/install on subsequent runs.
    # Cache to ~/.local/bin because actions/cache can't write to /usr/bin.
    - id: 'apt-cache'
      uses: 'actions/cache@v5'
      with:
        key: 'apt-${{ runner.os }}-chktex'
        path: '~/.local/bin/chktex'
    - if: |
        steps.apt-cache.outputs.cache-hit != 'true'
      run: >-
        sudo apt-get update && sudo apt-get install -y chktex
        && mkdir -p ~/.local/bin && cp /usr/bin/chktex ~/.local/bin/
    # On cache hit, chktex is restored to ~/.local/bin but not on PATH.
    - if: |
        steps.apt-cache.outputs.cache-hit == 'true'
      run: 'echo "$HOME/.local/bin" >> "$GITHUB_PATH"'
    - uses: 'actions/checkout@v6'
    - uses: 'dtolnay/rust-toolchain@stable'
      with:
        components: 'clippy, rustfmt'
    - uses: 'Swatinem/rust-cache@v2'
      with:
        shared-key: 'rust-${{ runner.os }}'
    - uses: 'actions/setup-node@v6'
      with:
        node-version: '${{ env.NODE_VERSION }}'
    - uses: 'actions/setup-python@v6'
      with:
        cache: 'pip'
        cache-dependency-path: '.github/workflows/lint/requirements.txt'
        python-version: '${{ env.PYTHON_VERSION }}'
    - run: 'pip install -r .github/workflows/lint/requirements.txt'
    - uses: 'actions/cache@v3'
      with:
        key: 'pre-commit-lint-${{ runner.os }}-${{ runner.arch }}-node-${{
              env.NODE_VERSION }}-python-${{ env.PYTHON_VERSION
              }}-pre-commit-${{ env.PRE_COMMIT_VERSION }}-${{
              hashFiles(env.CONFIG_PATH) }}'
        path: '~/.cache/pre-commit'
    - run: 'pre-commit install-hooks -c ${{ env.CONFIG_PATH }}'
    - run: >-
        pre-commit run --all-files --color=always --show-diff-on-failure
        --config ${{ env.CONFIG_PATH }}
    - run: 'npx prettier --check .'
      working-directory: 'docs'
name: 'Lint'
'on':
  pull_request: null
...
