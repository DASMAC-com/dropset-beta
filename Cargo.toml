[build-dependencies]
dropset-build = {path = "build"}
dropset-interface = {path = "interface"}

[package]
name = "dropset"
edition.workspace = true
version.workspace = true

[workspace]
members = ["build", "macros", "interface", "tests"]
resolver = "3"

[workspace.dependencies]
mollusk-svm = "0.10.3"
pinocchio = "0.10.2"
proc-macro2 = "1.0.106"
solana-account = "3.4.0"
solana-instruction = "3.2.0"
solana-keypair = "3.0.0"
solana-program-error = "3.0.0"
solana-pubkey = "3.0.0"
solana-signer = "3.0.0"
quote = "1.0.45"
syn = {version = "2.0.117", features = ["full"]}

[workspace.package]
edition = "2024"
version = "0.1.0"
